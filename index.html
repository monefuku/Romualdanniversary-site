<!DOCTYPE html>
<html>
<head>
<title>Romuald & Mone ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #2b0a12, #4a0e1a, #6d0f23);
  font-family: Georgia, serif;
  color: #f5e6e8;
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
}

h1 {
  font-size: 4rem;
  font-weight: 300;
  letter-spacing: 3px;
  margin-bottom: 15px;
}

.subtitle {
  font-size: 1.2rem;
  opacity: 0.85;
  margin-bottom: 50px;
  font-style: italic;
}

.button {
  display: block;
  width: 280px;
  margin: 18px auto;
  padding: 18px;
  text-decoration: none;
  color: #f5e6e8;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  border-radius: 50px;
  font-size: 1.1rem;
  letter-spacing: 1px;
  transition: all 0.4s ease;
}

.button:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-3px);
}

.sparkle {
  position: absolute;
  color: rgba(255,255,255,0.15);
  animation: float 12s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  to {
    transform: translateY(-100px);
    opacity: 0;
  }
}

.corner {
  position: absolute;
  font-size: 8rem;
  opacity: 0.05;
}

.top-left {
  top: -20px;
  left: 20px;
}

.bottom-right {
  bottom: -20px;
  right: 20px;
}
</style>
</head>

<body>

<div class="corner top-left">❦</div>
<div class="corner bottom-right">❦</div>

<div class="container">

  <h1>Romuald & Mone</h1>

  <div class="subtitle">
    One year later, and I'd still choose you every time.
  </div>

  <a class="button" href="memories.html">
    📸 Memories
  </a>

  <a class="button" href="gift.html">
    💌 Love Letter
  </a>

  <a class="button" href="riddle.html">
    🎁 Present Box
  </a>

</div>

<script>
for(let i = 0; i < 25; i++) {
  const s = document.createElement('div');
  s.innerHTML = '✦';
  s.className = 'sparkle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.fontSize = (10 + Math.random() * 20) + 'px';
  s.style.animationDuration = (8 + Math.random() * 8) + 's';
  s.style.animationDelay = Math.random() * 10 + 's';
  document.body.appendChild(s);
}
</script>

</body>
</html>
